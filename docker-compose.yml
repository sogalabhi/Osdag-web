services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-osdagdeveloper}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-postgres_Intg_osdag}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-osdagdeveloper} -d ${DATABASE_NAME:-postgres_Intg_osdag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app:/app/backend
      HOME: /tmp
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_NAME: ${DATABASE_NAME:-postgres_Intg_osdag}
      DATABASE_USER: ${DATABASE_USER:-osdagdeveloper}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "/opt/conda/envs/osdag_env/bin/python manage.py migrate &&
      /opt/conda/envs/osdag_env/bin/python populate_database.py &&
      /opt/conda/envs/osdag_env/bin/gunicorn config.asgi:application 
      --bind 0.0.0.0:8000 
      --workers 2 
      --worker-class uvicorn.workers.UvicornWorker 
      --timeout 60"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    user: "1000:1000" # Fixed mapping profile matching your laptop workspace properties
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app:/app/backend
      HOME: /tmp
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DATABASE_NAME: ${DATABASE_NAME:-postgres_Intg_osdag}
      DATABASE_USER: ${DATABASE_USER:-osdagdeveloper}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -c "cd /app && PYTHONPATH=/app:/app/backend /opt/conda/envs/osdag_env/bin/celery -A config worker -Q calculations,cad,reports,celery --loglevel=info --concurrency=4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data_dev:
