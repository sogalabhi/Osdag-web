name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy Firebase config
        run: |
          mkdir -p backend
          echo '{}' > backend/firebase-service-account.json

      - name: Start DB and Redis
        run: docker compose up -d db redis

      - name: Wait for Database
        run: |
          python -c "
          import socket, time
          for i in range(15):
              try:
                  with socket.create_connection(('localhost', 5433), timeout=1):
                      print('Database is ready!')
                      break
              except socket.error:
                  print('Waiting for database...')
                  time.sleep(1)
          "

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: osdag_env
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          miniforge-version: "latest"
          use-mamba: true
          cache-downloads: true
          cache-downloads-key: ${{ runner.os }}-conda-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          mamba install pythonocc-core cairo pip -y
          python -m pip install -r requirements.txt pytest pytest-django

      - name: Run tests
        shell: bash -l {0}
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5433
          DATABASE_NAME: postgres_Intg_osdag
          DATABASE_USER: osdagdeveloper
          DATABASE_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          xvfb-run python -m pytest --ds=config.settings

      - name: Teardown
        if: always()
        run: docker compose down
