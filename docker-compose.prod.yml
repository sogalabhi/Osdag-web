services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-osdagdeveloper}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      POSTGRES_DB: ${DATABASE_NAME:-postgres_Intg_osdag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-osdagdeveloper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-changeme}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_NAME: ${DATABASE_NAME:-postgres_Intg_osdag}
      DATABASE_USER: ${DATABASE_USER:-osdagdeveloper}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-true}
    volumes:
      - ./file_storage:/app/file_storage
      - ./osifiles:/app/osifiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "source /opt/miniconda/etc/profile.d/conda.sh &&
      conda activate myenv &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    expose:
      - "8000"
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DATABASE_NAME: ${DATABASE_NAME:-postgres_Intg_osdag}
      DATABASE_USER: ${DATABASE_USER:-osdagdeveloper}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "source /opt/miniconda/etc/profile.d/conda.sh &&
      conda activate myenv &&
      celery -A config worker --loglevel=info"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
